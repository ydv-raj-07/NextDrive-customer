workflows:
  build-android:
    name: Build Android APK
    environment:
      flutter: 3.16.0
    scripts:
      - name: Install dependencies
        script: |
          flutter --version
          flutter pub get
      - name: Build unsigned release APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
